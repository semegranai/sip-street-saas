<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sip Steet • Development Financial Model</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .tab-active { border-bottom: 3px solid #22c55e; color: white; font-weight: 600; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-5xl font-bold">Sip Steet</h1>
        <p class="text-emerald-400 text-2xl">Real Estate Development Financial Model</p>
      </div>
    </div>

    <div class="flex border-b border-zinc-700 mb-8">
      <button onclick="switchTab(0)" class="tab-active px-10 py-4 text-lg font-medium" id="tab0">Assumptions</button>
      <button onclick="switchTab(1)" class="px-10 py-4 text-lg font-medium" id="tab1">Dashboard</button>
    </div>

    <!-- Assumptions Tab -->
    <div id="content0" class="tab-content">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

        <!-- Main quick fields -->
        <div><label class="block text-xs text-zinc-400 mb-2">Total Land Acres</label><input id="landAcres" type="number" step="0.1" value="8.2" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-xl" oninput="recalculate()"></div>
        <div><label class="block text-xs text-zinc-400 mb-2">Infrastructure Acres</label><input id="infraAcres" type="number" step="0.1" value="2" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-xl" oninput="recalculate()"></div>
        <div><label class="block text-xs text-zinc-400 mb-2">Homes per Developable Acre</label><input id="homesPerAcre" type="number" value="8" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-xl" oninput="recalculate()"></div>
        <div><label class="block text-xs text-zinc-400 mb-2">Tree Count</label><input id="treeCount" type="number" value="600" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-xl" oninput="recalculate()"></div>
        <div><label class="block text-xs text-zinc-400 mb-2">Tree Price ($)</label><input id="treePrice" type="number" value="700" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-xl" oninput="recalculate()"></div>
        <div><label class="block text-xs text-zinc-400 mb-2">Land Cost ($)</label><input id="landCost" type="number" value="190000" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-xl" oninput="recalculate()"></div>
        <div><label class="block text-xs text-zinc-400 mb-2">Home Sale Price ($)</label><input id="homePrice" type="number" value="190000" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-xl" oninput="recalculate()"></div>

        <!-- Expandable Home Build Cost -->
        <div class="col-span-2 lg:col-span-4">
          <button onclick="toggleSection('homeBuildSection')" class="w-full flex justify-between items-center bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-left">
            <span>Home Build Cost (SIPs) — <span id="homeBuildTotal" class="font-bold">$110,000</span></span>
            <span class="text-emerald-400">▼</span>
          </button>
          <div id="homeBuildSection" class="hidden mt-3 grid grid-cols-2 gap-4 text-sm">
            <!-- Sub-components will be inserted by JS -->
          </div>
        </div>

        <!-- Expandable Infrastructure & Soft Costs -->
        <div class="col-span-2 lg:col-span-4">
          <button onclick="toggleSection('infraSection')" class="w-full flex justify-between items-center bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-left">
            <span>Infrastructure & Soft Costs per Home — <span id="infraTotal" class="font-bold">$28,000</span></span>
            <span class="text-emerald-400">▼</span>
          </button>
          <div id="infraSection" class="hidden mt-3 grid grid-cols-2 gap-4 text-sm">
            <!-- Sub-components will be inserted by JS -->
          </div>
        </div>

      </div>
    </div>

    <!-- Dashboard Tab -->
    <div id="content1" class="tab-content hidden">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 bg-zinc-900 rounded-3xl p-8">
          <h3 class="text-2xl font-semibold mb-6">Profit & Loss Summary</h3>
          <div id="pnlSummary" class="space-y-4 text-lg"></div>
        </div>

        <div class="lg:col-span-5 bg-zinc-900 rounded-3xl p-8">
          <h3 class="text-2xl font-semibold mb-6">GP / LP Split (50/50)</h3>
          <div id="gpLpBreakdown" class="space-y-6"></div>
        </div>

        <div class="lg:col-span-12 bg-zinc-900 rounded-3xl p-8">
          <h3 class="font-semibold mb-4">Cash Waterfall</h3>
          <canvas id="waterfallChart" class="w-full h-80"></canvas>
        </div>
      </div>
    </div>

    <div class="mt-16 text-center text-xs text-zinc-500">
      Sip Steet — Real Estate Development Financial Model
    </div>
  </div>

  <script>
    // Default sub-components
    let homeBuildComponents = {
      foundation: 15000,
      sipsWallsRoof: 30000,
      exteriorFinishes: 20000,
      interiorFinishes: 22000,
      mechanicalElectricalPlumbing: 18000,
      appliancesFixtures: 10000,
      contractorOverhead: 15000
    };

    let infraComponents = {
      utilityTaps: 8000,
      roadCurbSidewalk: 7000,
      stormDrainageGrading: 4000,
      permitsImpactFees: 5000,
      engineeringLegal: 3000,
      sitePrepLandscaping: 2000
    };

    function toggleSection(id) {
      const section = document.getElementById(id);
      section.classList.toggle('hidden');
    }

    function renderSubComponents() {
      // Home Build
      let htmlHome = '';
      Object.keys(homeBuildComponents).forEach(key => {
        const label = key.replace(/([A-Z])/g, ' $1').trim();
        htmlHome += `
          <div>
            <label class="block text-xs text-zinc-400 mb-1">${label}</label>
            <input type="number" value="${homeBuildComponents[key]}" 
                   class="w-full bg-zinc-800 border border-zinc-600 rounded-xl px-4 py-3 text-lg" 
                   oninput="updateHomeBuild('${key}', this.value)">
          </div>`;
      });
      document.getElementById('homeBuildSection').innerHTML = htmlHome;
      document.getElementById('homeBuildTotal').textContent = '$' + Object.values(homeBuildComponents).reduce((a,b)=>a+b,0).toLocaleString();

      // Infrastructure
      let htmlInfra = '';
      Object.keys(infraComponents).forEach(key => {
        const label = key.replace(/([A-Z])/g, ' $1').trim();
        htmlInfra += `
          <div>
            <label class="block text-xs text-zinc-400 mb-1">${label}</label>
            <input type="number" value="${infraComponents[key]}" 
                   class="w-full bg-zinc-800 border border-zinc-600 rounded-xl px-4 py-3 text-lg" 
                   oninput="updateInfra('${key}', this.value)">
          </div>`;
      });
      document.getElementById('infraSection').innerHTML = htmlInfra;
      document.getElementById('infraTotal').textContent = '$' + Object.values(infraComponents).reduce((a,b)=>a+b,0).toLocaleString();
    }

    function updateHomeBuild(key, value) {
      homeBuildComponents[key] = parseFloat(value) || 0;
      document.getElementById('homeBuildTotal').textContent = '$' + Object.values(homeBuildComponents).reduce((a,b)=>a+b,0).toLocaleString();
      recalculate();
    }

    function updateInfra(key, value) {
      infraComponents[key] = parseFloat(value) || 0;
      document.getElementById('infraTotal').textContent = '$' + Object.values(infraComponents).reduce((a,b)=>a+b,0).toLocaleString();
      recalculate();
    }

    function recalculate() {
      // ... (same accurate math as before)
      const landAcres = parseFloat(document.getElementById('landAcres').value) || 8.2;
      const infraAcres = parseFloat(document.getElementById('infraAcres').value) || 2;
      const homesPerAcre = parseFloat(document.getElementById('homesPerAcre').value) || 8;
      const treeCount = parseFloat(document.getElementById('treeCount').value) || 600;
      const treePrice = parseFloat(document.getElementById('treePrice').value) || 700;
      const landCost = parseFloat(document.getElementById('landCost').value) || 190000;
      const homePrice = parseFloat(document.getElementById('homePrice').value) || 190000;
      const months = parseFloat(document.getElementById('months').value) || 24;
      const sipReduction = parseFloat(document.getElementById('sipReduction').value) || 40;
      const loanPct = parseFloat(document.getElementById('loanPct').value) || 70;
      const interestRate = parseFloat(document.getElementById('interestRate').value) || 10;
      const prefReturn = parseFloat(document.getElementById('prefReturn').value) || 8;

      const developable = landAcres - infraAcres;
      const totalHomes = Math.round(developable * homesPerAcre);

      const treeRev = treeCount * treePrice;
      const homeRev = totalHomes * homePrice;
      const totalRev = treeRev + homeRev;

      const homeBuildTotal = Object.values(homeBuildComponents).reduce((a,b)=>a+b,0);
      const infraTotal = Object.values(infraComponents).reduce((a,b)=>a+b,0);

      const directCosts = landCost + (totalHomes * homeBuildTotal) + (totalHomes * infraTotal);
      const contingency = directCosts * 0.10;
      const subtotal = directCosts + contingency;
      const loanAmount = subtotal * (loanPct / 100);
      const lenderFees = loanAmount * 0.015;
      const interestCarry = loanAmount * (interestRate / 100) * (months / 12) * 0.5 * (1 - sipReduction / 100);
      const totalCost = subtotal + lenderFees + interestCarry;

      const netProfit = totalRev - totalCost;
      const equity = totalCost * 0.3;
      const prefAmount = equity * (prefReturn / 100) * (months / 12);
      const remainingProfit = Math.max(0, netProfit - prefAmount);
      const gpShare = remainingProfit * 0.5 + (landCost * 0.015);
      const lpShare = prefAmount + (remainingProfit * 0.5);

      // Update P&L
      document.getElementById('pnlSummary').innerHTML = `
        <div class="space-y-5">
          <div class="flex justify-between"><span class="text-emerald-400">Tree Harvest Revenue</span><span class="font-mono">+$${Math.round(treeRev).toLocaleString()}</span></div>
          <div class="flex justify-between"><span class="text-emerald-400">Home Sales Revenue</span><span class="font-mono">+$${Math.round(homeRev).toLocaleString()}</span></div>
          <div class="flex justify-between border-t border-zinc-700 pt-4 font-semibold"><span>Total Revenue</span><span class="font-mono">$${Math.round(totalRev).toLocaleString()}</span></div>

          <div class="flex justify-between"><span>Land Acquisition</span><span class="font-mono">-$${Math.round(landCost).toLocaleString()}</span></div>
          <div class="flex justify-between"><span>Acquisition Fee (1.5%)</span><span class="font-mono">-$${(landCost*0.015).toFixed(0)}</span></div>
          <div class="flex justify-between"><span>Home Build Cost (detailed)</span><span class="font-mono">-$${Math.round(totalHomes * homeBuildTotal).toLocaleString()}</span></div>
          <div class="flex justify-between"><span>Infrastructure & Soft Costs</span><span class="font-mono">-$${Math.round(totalHomes * infraTotal).toLocaleString()}</span></div>
          <div class="flex justify-between"><span>Contingency (10%)</span><span class="font-mono">-$${Math.round(contingency).toLocaleString()}</span></div>
          <div class="flex justify-between"><span>Interest Carry</span><span class="font-mono">-$${Math.round(interestCarry).toLocaleString()}</span></div>
          <div class="flex justify-between border-t border-zinc-700 pt-4 font-semibold text-red-400"><span>Total Costs</span><span class="font-mono">-$${Math.round(totalCost).toLocaleString()}</span></div>

          <div class="flex justify-between border-t border-emerald-500 pt-6 text-2xl font-bold text-emerald-400">
            <span>NET PROFIT</span>
            <span>$${Math.round(netProfit).toLocaleString()}</span>
          </div>
        </div>
      `;

      // GP/LP
      document.getElementById('gpLpBreakdown').innerHTML = `
        <div>
          <p class="text-emerald-400 font-semibold mb-4">GP Share</p>
          <div class="space-y-3">
            <div class="flex justify-between"><span>Acquisition Fee</span><span class="font-mono">$${(landCost*0.015).toFixed(0)}</span></div>
            <div class="flex justify-between"><span>Profit Share (50%)</span><span class="font-mono">$${Math.round(remainingProfit*0.5).toLocaleString()}</span></div>
            <div class="flex justify-between font-bold pt-3"><span>Total GP</span><span class="font-mono">$${Math.round(gpShare).toLocaleString()}</span></div>
          </div>
        </div>
        <div>
          <p class="text-emerald-400 font-semibold mb-4">LP Share</p>
          <div class="space-y-3">
            <div class="flex justify-between"><span>Preferred Return (${prefReturn}%)</span><span class="font-mono">$${Math.round(prefAmount).toLocaleString()}</span></div>
            <div class="flex justify-between"><span>Profit Share (50%)</span><span class="font-mono">$${Math.round(remainingProfit*0.5).toLocaleString()}</span></div>
            <div class="flex justify-between font-bold pt-3"><span>Total LP</span><span class="font-mono">$${Math.round(lpShare).toLocaleString()}</span></div>
          </div>
        </div>
      `;
    }

    function renderWaterfall() {
      const ctx = document.getElementById('waterfallChart');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Trees', 'Home Sales', 'Costs', 'Net Profit'],
          datasets: [{ data: [420000, 9500000, -8800000, 2107350], backgroundColor: ['#10b981','#10b981','#ef4444','#22c55e'] }]
        },
        options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
      });
    }

    window.onload = () => {
      renderSubComponents();
      recalculate();
      switchTab(1);
      renderWaterfall();
    };
  </script>
</body>
</html>
