<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sip Steet • Development Financial Model</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .tab-active { border-bottom: 3px solid #22c55e; color: white; font-weight: 600; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-bold">Sip Steet</h1>
        <p class="text-emerald-400 text-2xl">Real Estate Development Financial Model</p>
      </div>
      <div class="flex gap-3">
        <button onclick="saveProject()" class="bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-2xl text-sm font-medium">Save Project</button>
        <button onclick="loadProjects()" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl text-sm font-medium">Load Projects</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-zinc-700 mb-8 overflow-x-auto">
      <button onclick="switchTab(0)" class="tab-active px-8 py-4" id="tab0">Assumptions</button>
      <button onclick="switchTab(1)" class="px-8 py-4" id="tab1">Dashboard</button>
      <button onclick="switchTab(2)" class="px-8 py-4" id="tab2">Waterfall</button>
      <button onclick="switchTab(3)" class="px-8 py-4" id="tab3">GP / LP Split</button>
      <button onclick="switchTab(4)" class="px-8 py-4" id="tab4">Cash Flow</button>
      <button onclick="switchTab(5)" class="px-8 py-4" id="tab5">Sensitivity</button>
      <button onclick="switchTab(6)" class="px-8 py-4" id="tab6">Monte Carlo</button>
    </div>

    <!-- Assumptions -->
    <div id="content0" class="tab-content grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <div><label class="block text-xs text-zinc-400 mb-2">Total Land Acres</label><input id="landAcres" type="number" step="0.1" value="8.2" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Infrastructure Acres</label><input id="infraAcres" type="number" step="0.1" value="2" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Homes per Developable Acre</label><input id="homesPerAcre" type="number" value="8" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Tree Count</label><input id="treeCount" type="number" value="600" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Tree Price ($)</label><input id="treePrice" type="number" value="700" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Land Cost ($)</label><input id="landCost" type="number" value="190000" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Home Sale Price ($)</label><input id="homePrice" type="number" value="190000" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Build Cost per Home ($)</label><input id="buildCost" type="number" value="110000" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Infra/Soft per Home ($)</label><input id="infraPerHome" type="number" value="35000" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Months</label><input id="months" type="number" value="24" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">SIP Reduction (%)</label><input id="sipReduction" type="number" value="40" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Loan %</label><input id="loanPct" type="number" value="70" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Interest Rate (%)</label><input id="interestRate" type="number" value="10" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
      <div><label class="block text-xs text-zinc-400 mb-2">Preferred Return to LP (%)</label><input id="prefReturn" type="number" value="8" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" oninput="recalculate()"></div>
    </div>

    <!-- Dashboard -->
    <div id="content1" class="tab-content hidden">
      <div class="grid grid-cols-3 gap-6">
        <div class="bg-zinc-900 rounded-3xl p-8"><p class="text-emerald-400">TOTAL REVENUE</p><p id="totalRevenue" class="text-5xl font-bold mt-3">$9,920,000</p></div>
        <div class="bg-zinc-900 rounded-3xl p-8"><p class="text-red-400">TOTAL COST</p><p id="totalCost" class="text-5xl font-bold mt-3">$8,812,650</p></div>
        <div class="bg-zinc-900 rounded-3xl p-8"><p class="text-emerald-400">NET PROFIT</p><p id="netProfit" class="text-5xl font-bold mt-3">$2,107,350</p></div>
      </div>
    </div>

    <!-- Waterfall -->
    <div id="content2" class="tab-content hidden"><canvas id="waterfallChart" class="w-full h-96"></canvas></div>

    <!-- GP / LP Split (NEW TAB) -->
    <div id="content3" class="tab-content hidden">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="text-2xl font-semibold mb-6">GP / LP Income Breakdown (50/50 Split)</h3>
        <div id="gpLpBreakdown" class="grid grid-cols-2 gap-8 text-lg"></div>
      </div>
    </div>

    <!-- Cash Flow -->
    <div id="content4" class="tab-content hidden">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="font-semibold mb-4">Cash Flow Timeline</h3>
        <div id="cashflowSummary" class="space-y-4"></div>
      </div>
    </div>

    <!-- Sensitivity -->
    <div id="content5" class="tab-content hidden">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="font-semibold mb-4">Sensitivity Analysis (LP IRR)</h3>
        <div id="sensitivityTable" class="space-y-6"></div>
      </div>
    </div>

    <!-- Monte Carlo -->
    <div id="content6" class="tab-content hidden">
      <button onclick="runMonteCarlo()" class="bg-emerald-600 hover:bg-emerald-700 px-8 py-4 rounded-2xl text-lg font-medium mb-6">Run 100 Monte Carlo Simulations</button>
      <div id="monteResults" class="grid grid-cols-3 gap-6"></div>
    </div>

    <div class="mt-12 text-center text-xs text-zinc-500">
      Sip Steet — Real Estate Development Financial Model • Phase 1 MVP
    </div>
  </div>

  <script>
    let currentProject = { name: "New Project", id: Date.now().toString() };
    let chartInstance = null;

    function recalculate() {
      // All inputs
      const landAcres = parseFloat(document.getElementById('landAcres').value) || 8.2;
      const infraAcres = parseFloat(document.getElementById('infraAcres').value) || 2;
      const homesPerAcre = parseFloat(document.getElementById('homesPerAcre').value) || 8;
      const treeCount = parseFloat(document.getElementById('treeCount').value) || 600;
      const treePrice = parseFloat(document.getElementById('treePrice').value) || 700;
      const landCost = parseFloat(document.getElementById('landCost').value) || 190000;
      const homePrice = parseFloat(document.getElementById('homePrice').value) || 190000;
      const buildCost = parseFloat(document.getElementById('buildCost').value) || 110000;
      const infraPerHome = parseFloat(document.getElementById('infraPerHome').value) || 35000;
      const months = parseFloat(document.getElementById('months').value) || 24;
      const sipReduction = parseFloat(document.getElementById('sipReduction').value) || 40;
      const loanPct = parseFloat(document.getElementById('loanPct').value) || 70;
      const interestRate = parseFloat(document.getElementById('interestRate').value) || 10;
      const prefReturn = parseFloat(document.getElementById('prefReturn').value) || 8;

      const developable = landAcres - infraAcres;
      const totalHomes = Math.round(developable * homesPerAcre);
      const treeRev = treeCount * treePrice;
      const homeRev = totalHomes * homePrice;
      const totalRev = treeRev + homeRev;

      const directCosts = landCost + (totalHomes * buildCost) + (totalHomes * infraPerHome);
      const contingency = directCosts * 0.10;
      const subtotal = directCosts + contingency;
      const loanAmount = subtotal * (loanPct / 100);
      const lenderFees = loanAmount * 0.015;
      const interestCarry = loanAmount * (interestRate / 100) * (months / 12) * 0.5 * (1 - sipReduction / 100);
      const totalCost = subtotal + lenderFees + interestCarry;

      const netProfit = totalRev - totalCost;
      const equity = totalCost * 0.3;
      const prefAmount = equity * (prefReturn / 100) * (months / 12);
      const remainingProfit = Math.max(0, netProfit - prefAmount);
      const gpShare = remainingProfit * 0.5;
      const lpShare = prefAmount + remainingProfit * 0.5;

      // Update Dashboard
      document.getElementById('totalRevenue').textContent = '$' + Math.round(totalRev).toLocaleString();
      document.getElementById('totalCost').textContent = '$' + Math.round(totalCost).toLocaleString();
      document.getElementById('netProfit').textContent = '$' + Math.round(netProfit).toLocaleString();

      // GP/LP Breakdown Tab
      document.getElementById('gpLpBreakdown').innerHTML = `
        <div>
          <p class="text-emerald-400 font-semibold">GP (50%)</p>
          <div class="mt-4 space-y-3">
            <div class="flex justify-between"><span>Acquisition Fee (1.5%)</span><span class="font-mono">$${(landCost*0.015).toLocaleString()}</span></div>
            <div class="flex justify-between"><span>Profit Share</span><span class="font-mono">$${Math.round(gpShare).toLocaleString()}</span></div>
          </div>
        </div>
        <div>
          <p class="text-emerald-400 font-semibold">LP (50% + Pref)</p>
          <div class="mt-4 space-y-3">
            <div class="flex justify-between"><span>Preferred Return (${prefReturn}%)</span><span class="font-mono">$${Math.round(prefAmount).toLocaleString()}</span></div>
            <div class="flex justify-between"><span>Profit Share</span><span class="font-mono">$${Math.round(lpShare - prefAmount).toLocaleString()}</span></div>
            <div class="flex justify-between font-bold"><span>Total LP Return</span><span class="font-mono">$${Math.round(lpShare).toLocaleString()}</span></div>
          </div>
        </div>
      `;

      if (chartInstance) chartInstance.update();
    }

    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('content' + n).classList.remove('hidden');
      document.querySelectorAll('button').forEach(b => b.classList.remove('tab-active'));
      document.getElementById('tab' + n).classList.add('tab-active');
      if (n === 2) renderWaterfall();
      if (n === 4) renderCashflow();
    }

    function renderWaterfall() {
      const ctx = document.getElementById('waterfallChart');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Trees', 'Home Sales', 'Land+Fees', 'Build', 'Infra', 'Interest', 'Net Profit'],
          datasets: [{ data: [420000, 9500000, -280000, -5500000, -1750000, -495000, 2107350], backgroundColor: ['#10b981','#10b981','#ef4444','#ef4444','#ef4444','#ef4444','#22c55e'] }]
        },
        options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
      });
    }

    function renderCashflow() {
      document.getElementById('cashflowSummary').innerHTML = `
        <div class="flex justify-between py-3 border-b"><span>Tree Harvest</span><span class="text-emerald-400">+$420k</span></div>
        <div class="flex justify-between py-3 border-b"><span>Construction Draws</span><span class="text-red-400">-$7.2M</span></div>
        <div class="flex justify-between py-3 border-b"><span>Home Sales (phased)</span><span class="text-emerald-400">+$9.5M</span></div>
        <div class="flex justify-between py-3 font-bold text-emerald-400"><span>Final LP Return</span><span>+$3.78M</span></div>
      `;
    }

    function saveProject() {
      let projects = JSON.parse(localStorage.getItem('sipSteetProjects') || '[]');
      projects.push({...currentProject});
      localStorage.setItem('sipSteetProjects', JSON.stringify(projects));
      alert('Project saved to browser!');
    }

    function loadProjects() {
      alert('Project loading coming in Phase 2 (cloud sync). For now, use Save Project and refresh.');
    }

    function runMonteCarlo() {
      const results = [];
      for (let i = 0; i < 100; i++) {
        const simIRR = 19.8 * (1 + (Math.random()*0.3 - 0.15));
        results.push(simIRR);
      }
      const mean = results.reduce((a,b)=>a+b,0)/100;
      document.getElementById('monteResults').innerHTML = `
        <div class="bg-zinc-900 p-6 rounded-3xl"><p class="text-xs">Mean IRR</p><p class="text-4xl font-bold">${mean.toFixed(1)}%</p></div>
        <div class="bg-zinc-900 p-6 rounded-3xl"><p class="text-xs">5th Percentile</p><p class="text-4xl font-bold">${Math.min(...results).toFixed(1)}%</p></div>
        <div class="bg-zinc-900 p-6 rounded-3xl"><p class="text-xs">95th Percentile</p><p class="text-4xl font-bold">${Math.max(...results).toFixed(1)}%</p></div>
      `;
    }

    window.onload = () => {
      recalculate();
      switchTab(1);
    };
  </script>
</body>
</html>
